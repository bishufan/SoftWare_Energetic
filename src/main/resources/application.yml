server:
  port: 8080

spring:
  application:
    name: salary-management-system

  datasource:
    url: jdbc:h2:mem:salary_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
#    url: jdbc:mysql://localhost:3306/salary_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    username: root
#    password: root

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: false

# JWT Configuration
jwt:
  secret: SalaryMgmtSystemSecretKey2024ForJWTTokenGenerationMustBe256BitsLong
  expiration: 86400000

logging:
  level:
    com.salary: info
